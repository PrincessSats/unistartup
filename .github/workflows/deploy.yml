name: Deploy to Yandex Cloud
run-name: "${{ github.event.head_commit.message || github.event.pull_request.title || github.ref_name }}"

on:
  push:
    tags:
      - "v*"
      - "v.*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (example: v1.1.1)"
        required: true
        type: string

env:
  REGISTRY: cr.yandex
  BACKEND_IMAGE_NAME: hacknet-backend
  FRONTEND_BUCKET_NAME: hacknet-frontend

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-image-tag:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - name: Resolve image tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          IS_TAG_REF: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_TAG" ]; then
            IMAGE_TAG="$INPUT_TAG"
          elif [ "$IS_TAG_REF" = "true" ]; then
            IMAGE_TAG="$REF_NAME"
          else
            echo "No image tag provided. For manual runs, set workflow_dispatch input 'image_tag'."
            exit 1
          fi

          echo "Using image tag: $IMAGE_TAG"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  build-and-deploy-backend:
    needs: resolve-image-tag
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.build-image.outputs.image_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Yandex Cloud Container Registry
        uses: yc-actions/yc-cr-login@v1
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Build and push Backend Docker image
        id: build-image
        working-directory: ./backend
        run: |
          set -euo pipefail
          IMAGE_URL="${{ env.REGISTRY }}/${{ secrets.YC_REGISTRY_ID }}/${{ env.BACKEND_IMAGE_NAME }}:${{ needs.resolve-image-tag.outputs.image_tag }}"
          docker build -t "$IMAGE_URL" .
          docker push "$IMAGE_URL"
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"

      - name: Install YC CLI
        run: |
          set -euo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /opt/yc -n
          echo "/opt/yc/bin" >> $GITHUB_PATH

      - name: Configure YC CLI
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          YANDEX_CLOUD_FOLDER: ${{ secrets.YANDEX_CLOUD_FOLDER }}
        run: |
          set -euo pipefail
          echo "$YC_SA_JSON_CREDENTIALS" > /tmp/yc-sa.json
          yc config set service-account-key /tmp/yc-sa.json
          if [ -z "$YANDEX_CLOUD_FOLDER" ]; then
            echo "Missing required secret: YANDEX_CLOUD_FOLDER"
            exit 1
          fi
          yc config set folder-id "$YANDEX_CLOUD_FOLDER"

      - name: Deploy to Yandex Cloud Serverless Containers
        env:
          IMAGE_URL: ${{ steps.build-image.outputs.image_url }}
          YANDEX_CLOUD_API_KEY: ${{ secrets.YANDEX_CLOUD_API_KEY }}
          YANDEX_CLOUD_FOLDER: ${{ secrets.YANDEX_CLOUD_FOLDER }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          CLIENT_GIT: ${{ secrets.CLIENT_GIT }}
          CLIENT_GIT_SECRET: ${{ secrets.CLIENT_GIT_SECRET }}
          TG_BOT_API_TOKEN: ${{ secrets.TG_BOT_API_TOKEN }}
          TG_CLIENT_ID: ${{ secrets.TG_CLIENT_ID }}
          TG_CLIENT_SECRET: ${{ secrets.TG_CLIENT_SECRET }}
          YANDEX_MAIL_LOGIN: ${{ secrets.YANDEX_MAIL_LOGIN }}
          YANDEX_MAIL_PASSWORD: ${{ secrets.YANDEX_MAIL_PASSWORD }}
          BACKEND_CALLBACK_BASE_URL: ${{ secrets.BACKEND_CALLBACK_BASE_URL }}
          REFRESH_TOKEN_COOKIE_DOMAIN: ${{ secrets.REFRESH_TOKEN_COOKIE_DOMAIN }}
          BACKEND_CORES: ${{ secrets.BACKEND_CORES }}
          BACKEND_MEMORY: ${{ secrets.BACKEND_MEMORY }}
          BACKEND_CONCURRENCY: ${{ secrets.BACKEND_CONCURRENCY }}
          BACKEND_EXECUTION_TIMEOUT: ${{ secrets.BACKEND_EXECUTION_TIMEOUT }}
          BACKEND_MIN_INSTANCES: ${{ secrets.BACKEND_MIN_INSTANCES }}
          TRANSLATION_MODEL_ID: ${{ secrets.TRANSLATION_MODEL_ID }}
          TRANSLATION_REASONING_EFFORT: ${{ secrets.TRANSLATION_REASONING_EFFORT }}
          ARTICLE_MODEL_ID: ${{ secrets.ARTICLE_MODEL_ID }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AI_GEN_ENABLE_SELFTEST: ${{ secrets.AI_GEN_ENABLE_SELFTEST }}
          AI_GEN_SELFTEST_URL: ${{ secrets.AI_GEN_SELFTEST_URL }}
          AI_GEN_SELFTEST_TIMEOUT_S: ${{ secrets.AI_GEN_SELFTEST_TIMEOUT_S }}
        run: |
          set -euo pipefail
          if [ -z "$YANDEX_CLOUD_API_KEY" ] || [ -z "$YANDEX_CLOUD_FOLDER" ] || [ -z "$YANDEX_CLIENT_ID" ] || [ -z "$YANDEX_CLIENT_SECRET" ] || [ -z "$CLIENT_GIT" ] || [ -z "$CLIENT_GIT_SECRET" ] || [ -z "$TG_BOT_API_TOKEN" ] || [ -z "$TG_CLIENT_ID" ] || [ -z "$TG_CLIENT_SECRET" ] || [ -z "$YANDEX_MAIL_LOGIN" ] || [ -z "$YANDEX_MAIL_PASSWORD" ]; then
            echo "Missing required secrets: YANDEX_CLOUD_API_KEY, YANDEX_CLOUD_FOLDER, YANDEX_CLIENT_ID, YANDEX_CLIENT_SECRET, CLIENT_GIT, CLIENT_GIT_SECRET, TG_BOT_API_TOKEN, TG_CLIENT_ID, TG_CLIENT_SECRET, YANDEX_MAIL_LOGIN, YANDEX_MAIL_PASSWORD"
            exit 1
          fi
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing required secret: CRON_SECRET (cron endpoint will return 503 without it)"
            exit 1
          fi

          CORES="${BACKEND_CORES:-4}"
          MEMORY="${BACKEND_MEMORY:-8192MB}"
          CONCURRENCY="${BACKEND_CONCURRENCY:-16}"
          EXECUTION_TIMEOUT="${BACKEND_EXECUTION_TIMEOUT:-1800s}"
          # Держим >=1 тёплый инстанс, чтобы убрать холодные старты (главная причина "тормозит загрузка").
          # Provisioned-инстансы тарифицируются непрерывно — задаётся через секрет BACKEND_MIN_INSTANCES.
          MIN_INSTANCES="${BACKEND_MIN_INSTANCES:-1}"
          CORS_ORIGIN_REGEX='^https://(www\.)?hacknet\.tech$|^https://[a-zA-Z0-9-]+\.(website|storage)\.yandexcloud\.net$'

          ENV_VARS="DB_HOST=${{ secrets.DB_HOST }},DB_PORT=${{ secrets.DB_PORT }},DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},SECRET_KEY=${{ secrets.SECRET_KEY }},SQL_ECHO=false,CORS_ALLOW_CREDENTIALS=true,CORS_ALLOW_ORIGINS=https://hacknet.tech,CORS_ALLOW_ORIGIN_REGEX=${CORS_ORIGIN_REGEX},REFRESH_TOKEN_COOKIE_SECURE=true,REFRESH_TOKEN_COOKIE_SAMESITE=none,S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }},S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }},S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }},S3_TASK_BUCKET_NAME=${{ secrets.S3_TASK_BUCKET_NAME }},S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL }},S3_REGION=${{ secrets.S3_REGION }},YANDEX_CLOUD_API_KEY=${YANDEX_CLOUD_API_KEY},YANDEX_CLOUD_FOLDER=${YANDEX_CLOUD_FOLDER},YANDEX_CLIENT_ID=${YANDEX_CLIENT_ID},YANDEX_CLIENT_SECRET=${YANDEX_CLIENT_SECRET},CLIENT_GIT=${CLIENT_GIT},CLIENT_GIT_SECRET=${CLIENT_GIT_SECRET},TG_BOT_API_TOKEN=${TG_BOT_API_TOKEN},TG_CLIENT_ID=${TG_CLIENT_ID},TG_CLIENT_SECRET=${TG_CLIENT_SECRET},YANDEX_MAIL_LOGIN=${YANDEX_MAIL_LOGIN},YANDEX_MAIL_PASSWORD=${YANDEX_MAIL_PASSWORD},RUN_STARTUP_DB_MAINTENANCE=false,LOG_SLOW_REQUESTS=true,SLOW_REQUEST_THRESHOLD_MS=800,AI_GEN_RAG_CONTEXT_LIMIT=${{ secrets.AI_GEN_RAG_CONTEXT_LIMIT }}"
          ENV_VARS="${ENV_VARS},BACKEND_CALLBACK_BASE_URL=${BACKEND_CALLBACK_BASE_URL}"
          if [ -n "${REFRESH_TOKEN_COOKIE_DOMAIN:-}" ]; then
            ENV_VARS="${ENV_VARS},REFRESH_TOKEN_COOKIE_DOMAIN=${REFRESH_TOKEN_COOKIE_DOMAIN}"
          fi
          ENV_VARS="${ENV_VARS},REFRESH_TOKEN_COOKIE_SECURE=true"
          ENV_VARS="${ENV_VARS},REFRESH_TOKEN_COOKIE_SAMESITE=none"
          ENV_VARS="${ENV_VARS},TRANSLATION_MODEL_ID=${TRANSLATION_MODEL_ID:-deepseek-v32}"
          ENV_VARS="${ENV_VARS},TRANSLATION_REASONING_EFFORT=${TRANSLATION_REASONING_EFFORT:-low}"
          ENV_VARS="${ENV_VARS},ARTICLE_MODEL_ID=${ARTICLE_MODEL_ID:-deepseek-v32}"
          ENV_VARS="${ENV_VARS},CRON_SECRET=${CRON_SECRET}"
          # XSS self-test (Yandex Serverless Container). Enable only when URL is set;
          # backend pulls its IAM token from instance metadata (no token secret needed).
          if [ -n "${AI_GEN_SELFTEST_URL:-}" ]; then
            ENV_VARS="${ENV_VARS},AI_GEN_ENABLE_SELFTEST=${AI_GEN_ENABLE_SELFTEST:-true}"
            ENV_VARS="${ENV_VARS},AI_GEN_SELFTEST_URL=${AI_GEN_SELFTEST_URL}"
            ENV_VARS="${ENV_VARS},AI_GEN_SELFTEST_TIMEOUT_S=${AI_GEN_SELFTEST_TIMEOUT_S:-20}"
          fi
          yc serverless container revision deploy \
            --container-name hacknet-backend \
            --image "$IMAGE_URL" \
            --cores "$CORES" \
            --memory "$MEMORY" \
            --concurrency "$CONCURRENCY" \
            --execution-timeout "$EXECUTION_TIMEOUT" \
            --min-instances "$MIN_INSTANCES" \
            --service-account-id ${{ secrets.YC_SA_ID }} \
            --async-service-account-id ${{ secrets.YC_SA_ID }} \
            --environment "$ENV_VARS"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-and-deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and build
        working-directory: ./frontend
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${REACT_APP_API_BASE_URL:-}" ]; then
            echo "Missing required secret: REACT_APP_API_BASE_URL"
            exit 1
          fi
          if ! printf '%s' "$REACT_APP_API_BASE_URL" | grep -Eq '^https?://'; then
            echo "REACT_APP_API_BASE_URL must start with http:// or https://"
            exit 1
          fi
          npm ci --legacy-peer-deps
          # Не публиковать source maps в прод: ~3.5 МБ артефактов в бакете, не нужны браузеру.
          CI=true GENERATE_SOURCEMAP=false npm run build

      - name: Install AWS CLI
        run: |
          set -euo pipefail
          pip install awscli

      - name: Configure AWS CLI for Yandex S3
        run: |
          set -euo pipefail
          aws configure set aws_access_key_id ${{ secrets.YC_AWS_ACCESS_KEY }}
          aws configure set aws_secret_access_key ${{ secrets.YC_AWS_SECRET_KEY }}
          aws configure set region ru-central1

      - name: Sync frontend build to Yandex Object Storage
        working-directory: ./frontend/build
        env:
          BUCKET: s3://${{ env.FRONTEND_BUCKET_NAME }}
          ENDPOINT: https://storage.yandexcloud.net
        run: |
          set -euo pipefail
          # 1) Static hashed assets: long cache (uncompressed pass; also handles --delete cleanup)
          aws s3 sync . "$BUCKET" \
            --delete \
            --endpoint-url="$ENDPOINT" \
            --acl public-read \
            --exclude "*.html" \
            --exclude "*.json" \
            --cache-control "public, max-age=31536000, immutable"

          # 2) Entry points/manifests: no cache, so UI changes appear immediately after deploy
          aws s3 sync . "$BUCKET" \
            --endpoint-url="$ENDPOINT" \
            --acl public-read \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "no-cache, no-store, must-revalidate"

          # 3) Re-upload JS/CSS gzip-compressed. S3 static hosting does NOT compress on the fly,
          #    so the 1 MB bundle ships raw without this. Overwrites the plain objects from step 1
          #    with gzipped bytes + Content-Encoding header (browsers send Accept-Encoding: gzip).
          tmp="$(mktemp -d)"
          find . \( -name '*.js' -o -name '*.css' \) -type f | while IFS= read -r f; do
            rel="${f#./}"
            mkdir -p "$tmp/$(dirname "$rel")"
            gzip -9 -c "$f" > "$tmp/$rel"
            case "$rel" in
              *.js)  ct="application/javascript" ;;
              *.css) ct="text/css" ;;
              *)     ct="application/octet-stream" ;;
            esac
            aws s3 cp "$tmp/$rel" "$BUCKET/$rel" \
              --endpoint-url="$ENDPOINT" \
              --acl public-read \
              --content-encoding gzip \
              --content-type "$ct" \
              --cache-control "public, max-age=31536000, immutable"
          done
          rm -rf "$tmp"

          # 4) SPA deep-link 200s. With BrowserRouter, a refresh/direct-hit to a clean
          #    URL (e.g. /home) requests a real object; missing -> ErrorDocument serves
          #    index.html but with HTTP 404 (Yandex S3 cannot 200 a missing key).
          #    Upload index.html as a REAL object at each top-level route key so those
          #    paths return 200 and keep clean URLs/SEO. Must run AFTER step 1 (--delete),
          #    or the --delete pass would remove these extensionless keys.
          #    Param routes (/education/<id>, /knowledge/<id>) still fall back (404).
          ROUTES="home login register forgot-password reset-password auth/telegram auth/bridge profile admin admin/contests admin/contest-tasks-gen pipeline cve-pipeline nvd-sync championship education rating knowledge faq"
          for r in $ROUTES; do
            aws s3 cp index.html "$BUCKET/$r" \
              --endpoint-url="$ENDPOINT" \
              --acl public-read \
              --content-type "text/html" \
              --cache-control "no-cache, no-store, must-revalidate"
          done

      - name: Configure SPA fallback on bucket
        run: |
          set -euo pipefail
          cat > /tmp/website.json <<'EOF'
          {
            "IndexDocument": {"Suffix": "index.html"},
            "ErrorDocument": {"Key": "index.html"}
          }
          EOF
          aws s3api put-bucket-website \
            --endpoint-url=https://storage.yandexcloud.net \
            --bucket "${{ env.FRONTEND_BUCKET_NAME }}" \
            --website-configuration file:///tmp/website.json
